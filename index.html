<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#020008">
  <link rel="manifest" href="manifest.json">
  <title>JEZERO</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
    }
    #game-container { position: relative; }
    #game-container canvas { display: block; image-rendering: pixelated; }

    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #020008;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 28px;
    }
    #rotate-overlay.visible { display: flex; }
    #rotate-icon {
      font-size: 72px;
      animation: rotate-hint 1.6s ease-in-out infinite;
    }
    @keyframes rotate-hint {
      0%   { transform: rotate(0deg);   }
      40%  { transform: rotate(90deg);  }
      60%  { transform: rotate(90deg);  }
      100% { transform: rotate(0deg);   }
    }
    #rotate-overlay p {
      font-family: monospace;
      font-size: 15px;
      letter-spacing: 3px;
      color: #ff5500;
      text-align: center;
      text-transform: uppercase;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div id="rotate-overlay">
    <div id="rotate-icon">&#x1F4F1;</div>
    <p>ROTATE YOUR PHONE<br>FOR THE BEST EXPERIENCE</p>
  </div>
  <div id="game-container"></div>

  <script>
    (function () {
      const overlay = document.getElementById('rotate-overlay');
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
                       ('ontouchstart' in window && navigator.maxTouchPoints > 1);
      function check() {
        if (isMobile && window.innerWidth < window.innerHeight) {
          overlay.classList.add('visible');
        } else {
          overlay.classList.remove('visible');
        }
      }
      window.addEventListener('resize', check);
      window.addEventListener('orientationchange', check);
      check();
    })();
  </script>

  <script src="https://unpkg.com/phaser@3.60.0/dist/phaser.min.js"></script>
  <script>
    const W = 844, H = 390;

    // ── shared helper ──────────────────────────────────────────────────────────
    function drawStarfield(scene) {
      const g = scene.add.graphics();
      g.fillStyle(0x020008, 1);
      g.fillRect(0, 0, W, H);
      // warm glow from Mars surface at horizon
      g.fillGradientStyle(0x000000, 0x000000, 0x180800, 0x180800, 0, 0, 1, 1);
      g.fillRect(0, H * 0.45, W, H * 0.55);
      for (let i = 0; i < 130; i++) {
        const sx = Phaser.Math.Between(0, W);
        const sy = Phaser.Math.Between(0, H * 0.65);
        g.fillStyle(0xffffff, Phaser.Math.FloatBetween(0.2, 0.9));
        g.fillCircle(sx, sy, Phaser.Math.FloatBetween(0.4, 1.4));
      }
    }

    // ── EMAIL GATE ─────────────────────────────────────────────────────────────
    class EmailGateScene extends Phaser.Scene {
      constructor() { super({ key: 'EmailGate' }); }

      create() {
        drawStarfield(this);

        this.add.text(W / 2, 68, 'JEZERO', {
          fontFamily: 'monospace', fontSize: '76px', fontStyle: 'bold',
          color: '#ff5500', stroke: '#2a0800', strokeThickness: 6
        }).setOrigin(0.5);

        this.add.text(W / 2, 138, 'M A R S   M I S S I O N   ·   2 0 4 7', {
          fontFamily: 'monospace', fontSize: '13px', color: '#993300'
        }).setOrigin(0.5);

        const hr = this.add.graphics();
        hr.lineStyle(1, 0xff5500, 0.35);
        hr.lineBetween(W / 2 - 220, 162, W / 2 + 220, 162);

        const formHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;gap:16px;
                      font-family:monospace;">
            <p style="color:#7a3318;font-size:11px;letter-spacing:3px;
                      text-align:center;text-transform:uppercase;">
              Enter Crew Email to Begin Mission
            </p>
            <input id="email-input" type="email" placeholder="astronaut@nasa.gov"
              autocomplete="off" spellcheck="false"
              style="
                background: rgba(10,2,0,0.85);
                border: 1px solid #ff5500;
                border-radius: 0;
                color: #ff7733;
                padding: 10px 20px;
                font-family: monospace;
                font-size: 15px;
                width: 300px;
                outline: none;
                text-align: center;
                letter-spacing: 1px;
              "
            />
            <button id="launch-btn"
              style="
                background: #cc2200;
                border: none;
                color: #fff;
                padding: 11px 52px;
                font-family: monospace;
                font-size: 13px;
                letter-spacing: 6px;
                cursor: pointer;
                text-transform: uppercase;
              "
              onmouseover="this.style.background='#ff3300'"
              onmouseout="this.style.background='#cc2200'"
            >LAUNCH</button>
          </div>
        `;

        const form = this.add.dom(W / 2, 248).createFromHTML(formHTML);

        const tryLaunch = () => {
          const input = form.getChildByID('email-input');
          const email = (input.value || '').trim();
          if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            this.registry.set('email', email);
            this.scene.start('CharacterSelect');
          } else {
            this.cameras.main.shake(220, 0.006);
            input.style.borderColor = '#ff0000';
            this.time.delayedCall(700, () => { input.style.borderColor = '#ff5500'; });
          }
        };

        form.addListener('click');
        form.on('click', e => { if (e.target.id === 'launch-btn') tryLaunch(); });
        form.addListener('keydown');
        form.on('keydown', e => { if (e.key === 'Enter') tryLaunch(); });

        this.add.text(W / 2, 365, 'JEZERO CRATER  ·  18.4°N  77.7°E  ·  MARS', {
          fontFamily: 'monospace', fontSize: '10px', color: '#331100'
        }).setOrigin(0.5);
      }
    }

    // ── CHARACTER SELECT ───────────────────────────────────────────────────────
    class CharacterSelectScene extends Phaser.Scene {
      constructor() { super({ key: 'CharacterSelect' }); }

      preload() {
        this.load.spritesheet('human', 'assets/sprites/human.png',
          { frameWidth: 64, frameHeight: 64 });
        this.load.spritesheet('robot', 'assets/sprites/robot.png',
          { frameWidth: 64, frameHeight: 64 });
        this.load.image('rover', 'assets/sprites/rover.png');
      }

      create() {
        drawStarfield(this);

        this.add.text(W / 2, 38, 'SELECT YOUR CREW MEMBER', {
          fontFamily: 'monospace', fontSize: '19px', fontStyle: 'bold',
          color: '#ff5500', letterSpacing: 5
        }).setOrigin(0.5);

        this.anims.create({
          key: 'human-idle',
          frames: this.anims.generateFrameNumbers('human', { start: 0, end: 4 }),
          frameRate: 8, repeat: -1
        });
        this.anims.create({
          key: 'robot-idle',
          frames: this.anims.generateFrameNumbers('robot', { start: 0, end: 4 }),
          frameRate: 8, repeat: -1
        });

        // 3-column layout — equal spacing across 844px
        this.makeCard(W * 0.17, 218, 'human', 'HUMAN',  'EXPLORER CLASS',    3);
        this.makeCard(W * 0.50, 218, 'rover', 'ROVER',  'PERSEVERANCE ROVER', 2);
        this.makeCard(W * 0.83, 218, 'robot', 'AGENT',  'AI UNIT — MARK IV', 3);

        this.add.text(W / 2, 375, '↑ TAB BETWEEN CREW MEMBERS  ·  CLICK TO SELECT', {
          fontFamily: 'monospace', fontSize: '10px', color: '#3a1400'
        }).setOrigin(0.5);
      }

      makeCard(x, y, charKey, label, subtitle, spriteScale = 3) {
        const cw = 224, ch = 246;
        const lx = x - cw / 2, ty = y - ch / 2;

        const g = this.add.graphics();
        g.fillStyle(0x000000, 0.55);
        g.fillRect(lx, ty, cw, ch);
        g.lineStyle(1, 0xff5500, 0.5);
        g.strokeRect(lx, ty, cw, ch);

        // corner L-brackets
        const al = 18;
        g.lineStyle(2, 0xff5500, 1);
        [
          [lx,      ty,       1,  1],
          [lx + cw, ty,      -1,  1],
          [lx,      ty + ch,  1, -1],
          [lx + cw, ty + ch, -1, -1],
        ].forEach(([ax, ay, sx, sy]) => {
          g.lineBetween(ax, ay, ax + sx * al, ay);
          g.lineBetween(ax, ay, ax, ay + sy * al);
        });

        const sprite = this.add.sprite(x, y - 38, charKey).setScale(spriteScale);
        if (this.anims.exists(charKey + '-idle')) {
          sprite.play(charKey + '-idle');
        }

        this.add.text(x, y + 52, label, {
          fontFamily: 'monospace', fontSize: '20px', fontStyle: 'bold',
          color: '#ff8844'
        }).setOrigin(0.5);

        this.add.text(x, y + 76, subtitle, {
          fontFamily: 'monospace', fontSize: '11px',
          color: '#7a3318', letterSpacing: 2
        }).setOrigin(0.5);

        const btn = this.add.text(x, y + 103, '[ SELECT ]', {
          fontFamily: 'monospace', fontSize: '13px',
          color: '#ffffff', backgroundColor: '#aa2000',
          padding: { x: 14, y: 7 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });

        btn.on('pointerover', () => {
          btn.setColor('#ffdd00');
          btn.setBackgroundColor('#dd3300');
        });
        btn.on('pointerout', () => {
          btn.setColor('#ffffff');
          btn.setBackgroundColor('#aa2000');
        });
        btn.on('pointerdown', () => {
          this.registry.set('character', charKey);
          this.scene.start('Game');
        });
      }
    }

    // ── GAME OVER SCENE ────────────────────────────────────────────────────────
    class GameOverScene extends Phaser.Scene {
      constructor() { super({ key: 'GameOver' }); }

      create() {
        drawStarfield(this);

        const finalScore = this.registry.get('finalScore') || 0;

        // Dim overlay
        this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.55).setDepth(0);

        this.add.text(W / 2, H * 0.22, 'GAME OVER', {
          fontFamily: 'monospace', fontSize: '62px', fontStyle: 'bold',
          color: '#ff3300', stroke: '#220000', strokeThickness: 7
        }).setOrigin(0.5).setDepth(1);

        this.add.text(W / 2, H * 0.48, 'SCORE', {
          fontFamily: 'monospace', fontSize: '13px',
          color: '#7a3318', letterSpacing: 6
        }).setOrigin(0.5).setDepth(1);

        this.add.text(W / 2, H * 0.62, String(finalScore), {
          fontFamily: 'monospace', fontSize: '44px', fontStyle: 'bold',
          color: '#ff8844', stroke: '#440000', strokeThickness: 4
        }).setOrigin(0.5).setDepth(1);

        const btn = this.add.text(W / 2, H * 0.82, '[ PLAY AGAIN ]', {
          fontFamily: 'monospace', fontSize: '16px',
          color: '#ffffff', backgroundColor: '#aa2000',
          padding: { x: 22, y: 10 }
        }).setOrigin(0.5).setDepth(1).setInteractive({ useHandCursor: true });

        btn.on('pointerover', () => { btn.setColor('#ffdd00'); btn.setBackgroundColor('#dd3300'); });
        btn.on('pointerout',  () => { btn.setColor('#ffffff'); btn.setBackgroundColor('#aa2000'); });
        btn.on('pointerdown', () => { this.scene.start('CharacterSelect'); });
      }
    }

    // ── GAME SCENE ─────────────────────────────────────────────────────────────
    class GameScene extends Phaser.Scene {
      constructor() { super({ key: 'Game' }); }

      preload() {
        this.load.image('bg-sky',        'assets/bg/sky.jpg');
        this.load.image('bg-mountains',  'assets/bg/mountains.png');
        this.load.image('bg-rocks-mid',  'assets/bg/rocks-mid.png');
        this.load.image('bg-rocks-near', 'assets/bg/rocks-near.png');
        this.load.image('ground',        'assets/tiles/ground.jpg');
        this.load.image('plat-left',     'assets/tiles/platform-left.png');
        this.load.image('plat-mid',      'assets/tiles/platform-middle.png');
        this.load.image('plat-right',    'assets/tiles/platform-right.png');
        this.load.image('cloud',         'assets/collectibles/cloud.png');
        this.load.image('gem',           'assets/ui/gem.png');
        this.load.spritesheet('human', 'assets/sprites/human.png', { frameWidth: 64, frameHeight: 64 });
        this.load.spritesheet('robot', 'assets/sprites/robot.png', { frameWidth: 64, frameHeight: 64 });
        this.load.image('rover', 'assets/sprites/rover.png');
        this.load.spritesheet('alien-enemy', 'assets/enemies/crab.png',       { frameWidth: 64, frameHeight: 52 });
        this.load.spritesheet('ufo',         'assets/enemies/UFO.png',        { frameWidth: 64, frameHeight: 52 });
        this.load.spritesheet('meteor',      'assets/enemies/meteor.png',     { frameWidth: 64, frameHeight: 64 });
        this.load.spritesheet('explosion',   'assets/effects/explosion.png',  { frameWidth: 64, frameHeight: 64 });
        this.load.image('laser', 'assets/effects/bullet.png');
        this.load.image('heart', 'assets/ui/heart.png');

        const bar = this.add.graphics();
        this.load.on('progress', v => {
          bar.clear();
          bar.fillStyle(0x330800, 1);
          bar.fillRect(W / 2 - 150, H / 2 - 6, 300, 12);
          bar.fillStyle(0xff5500, 1);
          bar.fillRect(W / 2 - 150, H / 2 - 6, 300 * v, 12);
        });
        this.load.on('complete', () => bar.destroy());
      }

      create() {
        this.cameras.main.setBackgroundColor('#020008');

        // Parallax background layers — source textures are 1920×400
        const bgScaleY = H / 400;
        this.bg = {
          sky:       this.add.tileSprite(0, 0, W, H, 'bg-sky').setOrigin(0).setTileScale(1, bgScaleY),
          mountains: this.add.tileSprite(0, 0, W, H, 'bg-mountains').setOrigin(0).setTileScale(1, bgScaleY),
          rocksMid:  this.add.tileSprite(0, 0, W, H, 'bg-rocks-mid').setOrigin(0).setTileScale(1, bgScaleY),
          rocksNear: this.add.tileSprite(0, 0, W, H, 'bg-rocks-near').setOrigin(0).setTileScale(1, bgScaleY),
        };

        // Ground system — segmented with gaps
        this.groundSegments = [];
        this.lastGroundRightX = 0;

        // ── Player ───────────────────────────────────────────────────────────
        const charKey = this.registry.get('character') || 'human';

        // Per-character physics config — rover is a single 96×79 image at scale 1.5
        const CHAR = charKey === 'rover'
          ? { scale: 1.5, spawnOffY: Math.round(79 * 1.5 / 2),
              bW: 50, bH: 38, bOX: 23, bOY: 41,
              // body bounds used by wall-block & fall checks (world-space half-extents from sprite centre)
              bodyRight: 38, bodyBottom: 59 }
          : { scale: 2,   spawnOffY: 64,
              bW: 22, bH: 56, bOX: 22, bOY: 8,
              bodyRight: 24, bodyBottom: 64 };
        this.CHAR = CHAR;

        this.player = this.physics.add.sprite(
          Math.round(W * 0.2), (H - 40) - CHAR.spawnOffY, charKey);
        this.player.setScale(CHAR.scale).setDepth(5);
        this.player.body.setSize(CHAR.bW, CHAR.bH);
        this.player.body.setOffset(CHAR.bOX, CHAR.bOY);

        // ── Enemy & bullet groups ─────────────────────────────────────────────
        this.crabGroup   = this.physics.add.group();
        this.meteorGroup = this.physics.add.group();
        this.bulletGroup = this.physics.add.group();
        this.ufos = [];
        this.nextUFOSpawnTime = 15000;
        this.physics.add.overlap(this.bulletGroup, this.crabGroup,   this.onBulletHitEnemy, null, this);
        this.physics.add.overlap(this.bulletGroup, this.meteorGroup, this.onBulletHitEnemy, null, this);
        this.physics.add.overlap(this.player,      this.crabGroup,   this.onPlayerHitEnemy, null, this);
        this.physics.add.overlap(this.player,      this.meteorGroup, this.onPlayerHitEnemy, null, this);
        this.lastEnemySpawnTime = 0;
        this.lastShotTime  = 0;
        this.shotCooldown  = 300; // ms
        this.invincible        = false;
        this.gameOverTriggered = false;
        // Difficulty scaling
        this.scrollSpeed   = 2.2;
        this.speedLevel    = 0;
        this.gameStartTime = null;

        // Human: frames 0–3 run cycle, frame 4 jump
        this.anims.create({ key: 'human-run',  frames: this.anims.generateFrameNumbers('human', { start: 0, end: 3 }), frameRate: 10, repeat: -1 });
        this.anims.create({ key: 'human-jump', frames: [{ key: 'human', frame: 4 }], frameRate: 1, repeat: 0 });
        // Robot: frames 0–3 run cycle, frame 4 jump
        this.anims.create({ key: 'robot-run',  frames: this.anims.generateFrameNumbers('robot', { start: 0, end: 3 }), frameRate: 10, repeat: -1 });
        this.anims.create({ key: 'robot-jump', frames: [{ key: 'robot', frame: 4 }], frameRate: 1, repeat: 0 });
        this.player.play(charKey + '-run');

        this.anims.create({ key: 'alien-walk',    frames: this.anims.generateFrameNumbers('alien-enemy', { start: 0, end: 1 }), frameRate: 6,  repeat: -1 });
        this.anims.create({ key: 'ufo-fly',       frames: this.anims.generateFrameNumbers('ufo',         { start: 0, end: 1 }), frameRate: 8,  repeat: -1 });
        this.anims.create({ key: 'meteor-tumble', frames: this.anims.generateFrameNumbers('meteor',      { start: 0, end: 1 }), frameRate: 10, repeat: -1 });
        this.anims.create({ key: 'explode',       frames: this.anims.generateFrameNumbers('explosion',   { start: 0, end: 3 }), frameRate: 14, repeat: 0  });

        this.jumpKeys = this.input.keyboard.addKeys({
          space: Phaser.Input.Keyboard.KeyCodes.SPACE,
          up:    Phaser.Input.Keyboard.KeyCodes.UP
        });
        this.shootKeys = this.input.keyboard.addKeys({
          f: Phaser.Input.Keyboard.KeyCodes.F,
          z: Phaser.Input.Keyboard.KeyCodes.Z
        });
        // Left half = jump, right half = shoot; top 50 px = UI dead zone
        this.input.on('pointerdown', (ptr) => {
          if (ptr.y < 50) return;
          if (ptr.x < W / 2) { this.doJump(); } else { this.doShoot(); }
        });

        // ── Platforms ────────────────────────────────────────────────────────
        // Tiles scaled to 0.4× → left/right: 80 px wide, mid: 84 px wide, all 48 px tall
        this.PLAT_SCALE = 0.4;
        this.TILE_L  = Math.round(200 * this.PLAT_SCALE); // 80
        this.TILE_M  = Math.round(209 * this.PLAT_SCALE); // 84
        this.TILE_R  = Math.round(200 * this.PLAT_SCALE); // 80
        this.SURF_YOFF = 3;   // px below tile top to collision strip
        this.SURF_H    = 10;  // collision strip thickness

        // Initialise clouds array before platform seeding (spawnPlatform calls addCloud)
        this.clouds = [];

        // Seed ground — one solid run with no gaps before the game starts
        while (this.lastGroundRightX < W + 640) {
          const segW = Phaser.Math.Between(240, 480);
          this._addGroundSegment(this.lastGroundRightX, segW);
          this.lastGroundRightX += segW;
        }

        this.platforms      = [];
        this.lastPlatRightX = W * 0.5;
        for (let i = 0; i < 5; i++) this.spawnPlatform();

        // ── Score UI ─────────────────────────────────────────────────────────
        this.score = 0;
        this.add.image(W - 68, 44, 'gem').setDepth(20);
        this.scoreText = this.add.text(W - 44, 36, '0', {
          fontFamily: 'monospace', fontSize: '16px',
          color: '#ffffff', stroke: '#111111', strokeThickness: 2
        }).setDepth(20);

        // ── Lives (hearts) UI ─────────────────────────────────────────────────
        this.lives  = 3;
        this.hearts = [];
        for (let i = 0; i < 3; i++) {
          this.hearts.push(this.add.image(18 + i * 30, 18, 'heart').setScale(0.9).setDepth(20));
        }

        // ── DEV: character toggle ─────────────────────────────────────────────
        // TODO: remove before production
        this.devCharKey = charKey;

        // Scanline overlay
        const scan = this.add.graphics().setDepth(10);
        for (let sy = 0; sy < H; sy += 3) {
          scan.lineStyle(1, 0x000000, 0.08);
          scan.lineBetween(0, sy, W, sy);
        }
      }

      // ── Platform helpers ────────────────────────────────────────────────────
      spawnPlatform() {
        const gap    = Phaser.Math.Between(200, 380);
        const x      = this.lastPlatRightX + gap;
        const mids   = Phaser.Math.Between(0, 3);          // 0–3 mid tiles → 160–412 px wide
        const topY   = H - 160; // fixed height — always reachable with a single jump
        const plat   = this.buildPlatform(x, topY, mids);
        this.platforms.push(plat);
        this.lastPlatRightX = x + plat.width;
        // 75% chance: cloud hovers just above platform — player must land on platform to collect
        if (Math.random() < 0.75) this.addCloud(x + plat.width * 0.4, topY - 28);
      }

      buildPlatform(x, topY, midCount) {
        const S = this.PLAT_SCALE;
        const tiles = [];
        let cx = x;

        tiles.push(this.add.image(cx, topY, 'plat-left').setOrigin(0, 0).setScale(S).setDepth(3));
        cx += this.TILE_L;
        for (let i = 0; i < midCount; i++) {
          tiles.push(this.add.image(cx, topY, 'plat-mid').setOrigin(0, 0).setScale(S).setDepth(3));
          cx += this.TILE_M;
        }
        tiles.push(this.add.image(cx, topY, 'plat-right').setOrigin(0, 0).setScale(S).setDepth(3));
        cx += this.TILE_R;

        const totalW = cx - x;

        // Full-height body so player can land on top AND get blocked by the side wall.
        // checkCollision.down = false makes it one-way: player jumps through from below.
        const surf = this.add.rectangle(x, topY, totalW, 48)
          .setOrigin(0, 0).setAlpha(0);
        this.physics.add.existing(surf, false);
        surf.body.setAllowGravity(false);
        surf.body.setImmovable(true);
        surf.body.setVelocityX(-this.scrollSpeed * 60);
        surf.body.checkCollision.down = false;
        const collider     = this.physics.add.collider(this.player, surf);
        const crabCollider = this.physics.add.collider(this.crabGroup, surf);

        return { tiles, surf, collider, crabCollider, width: totalW, x };
      }

      // ── Cloud helpers ───────────────────────────────────────────────────────
      spawnCloud() {
        const gap = Phaser.Math.Between(110, 240);
        this.lastCloudX += gap;
        this.addCloud(this.lastCloudX, Phaser.Math.Between(H - 230, H - 160));
      }

      _addGroundSegment(x, width) {
        const vis = this.add.tileSprite(x, H - 40, width, 40, 'ground')
          .setOrigin(0, 0).setDepth(2);
        const rect = this.add.rectangle(x, H - 40, width, 40)
          .setOrigin(0, 0).setAlpha(0);
        this.physics.add.existing(rect, false);
        rect.body.setAllowGravity(false);
        rect.body.setImmovable(true);
        rect.body.setVelocityX(-this.scrollSpeed * 60);
        const playerCol = this.physics.add.collider(this.player, rect);
        const crabCol   = this.physics.add.collider(this.crabGroup, rect);
        this.groundSegments.push({ vis, rect, width, playerCol, crabCol });
      }

      spawnGroundChunk() {
        const TILE_W = 80;
        const x = this.lastGroundRightX;

        const gapAllowed = this.gameStartTime &&
          (this.time.now - this.gameStartTime > 4000);

        // Block gap if a platform's right edge just ended within the safe zone
        const safeAfterPlat = 3 * TILE_W;
        const nearPlatform = this.platforms.some(p => {
          const pr = p.surf.x + p.width;
          return pr > x - safeAfterPlat && pr <= x;
        });

        const gapChance = Math.min(0.55, 0.18 + this.speedLevel * 0.06);

        if (gapAllowed && !nearPlatform && Math.random() < gapChance) {
          this.lastGroundRightX += Phaser.Math.Between(1, 3) * TILE_W;
        } else {
          const segW = Phaser.Math.Between(3, 9) * TILE_W;
          this._addGroundSegment(x, segW);
          this.lastGroundRightX += segW;
        }
      }

      addCloud(x, y) {
        this.clouds.push(this.add.image(x, y, 'cloud').setScale(0.5).setDepth(4));
      }

      collectCloud(cloud, idx) {
        this.clouds.splice(idx, 1);
        this.score += 25;
        this.scoreText.setText(this.score);
        this.tweens.add({
          targets: cloud,
          scaleX: 1.8, scaleY: 1.8, alpha: 0,
          duration: 180, ease: 'Power2',
          onComplete: () => cloud.destroy()
        });
      }

      // ── Shoot ───────────────────────────────────────────────────────────────
      doShoot() {
        if (this.time.now - this.lastShotTime < this.shotCooldown) return;
        this.lastShotTime = this.time.now;
        const bullet = this.bulletGroup.create(this.player.x + 30, this.player.y, 'laser');
        bullet.setDepth(6).setScale(1.5);
        bullet.body.setAllowGravity(false);
        bullet.body.setVelocityX(750);
      }

      // ── Enemy spawning ──────────────────────────────────────────────────────
      spawnEnemy(time) {
        const spd = this.scrollSpeed;
        const roll = Math.random();
        let e;

        if (roll < 0.65) {
          // Crab — gravity-enabled, collides with ground + platforms via colliders set up in create/buildPlatform
          // body offset -8 shifts body up within sprite → equilibrium center at H-40-31=319
          const groundY = H - 40 - 31;
          const rightPlats = this.platforms.filter(p => p.surf.x > W * 0.6 && p.surf.x < W + 120);
          let spawnX = W + 60, spawnY = groundY;
          if (Math.random() < 0.60 && rightPlats.length > 0) {
            const plat = Phaser.Math.RND.pick(rightPlats);
            spawnX = plat.surf.x + plat.width * 0.5;
            spawnY = plat.surf.y - 31;
          }
          e = this.crabGroup.create(spawnX, spawnY, 'alien-enemy');
          e.setScale(1.5).setDepth(5).setFlipX(false);
          e.body.setOffset(0, -8);
          e.body.setAllowGravity(true);
          e.body.setVelocityX(-(160 + this.speedLevel * 15 + Phaser.Math.Between(0, 30)));
          e.play('alien-walk');
          e.setData('type', 'crab');

        } else {
          // Meteor — flies diagonally from top-right to bottom-left as an incoming projectile
          e = this.meteorGroup.create(W + Phaser.Math.Between(20, 120), Phaser.Math.Between(-80, -20), 'meteor');
          e.setScale(1.5).setDepth(5);
          e.body.setAllowGravity(false);
          e.body.setVelocityX(-(320 + this.speedLevel * 20 + Phaser.Math.Between(0, 60)));
          e.body.setVelocityY(  200 + this.speedLevel * 10 + Phaser.Math.Between(0, 80));
          e.play('meteor-tumble');
          e.setData('type', 'meteor');
        }
      }

      spawnUFO(time) {
        const baseY = Phaser.Math.Between(50, H - 180);
        const ufo = this.add.sprite(W + 80, baseY, 'ufo')
          .setScale(3).setDepth(2).setFrame(0);
        ufo.vx        = -(50 + Phaser.Math.Between(0, 30));
        ufo.baseY     = baseY;
        ufo.swoopAmp  = Phaser.Math.Between(22, 55);   // vertical swoop height px
        ufo.swoopFreq = 0.35 + Math.random() * 0.45;   // cycles per second
        ufo.elapsed   = 0;
        ufo.beamOn    = false;
        ufo.nextBeamTime = time + Phaser.Math.Between(1500, 4000);
        ufo.beamEndTime  = 0;
        this.ufos.push(ufo);
      }

      // ── Overlap callbacks ───────────────────────────────────────────────────
      onBulletHitEnemy(bullet, enemy) {
        bullet.destroy();
        this.spawnExplosion(enemy.x, enemy.y);
        enemy.destroy();
        this.score += 10;
        this.scoreText.setText(this.score);
      }

      onPlayerHitEnemy(player, enemy) {
        this.spawnExplosion(enemy.x, enemy.y);
        enemy.destroy();
        if (!this.invincible) this.loseLife();
      }

      spawnExplosion(x, y) {
        const exp = this.add.sprite(x, y, 'explosion').setScale(1.5).setDepth(8);
        exp.play('explode');
        exp.once('animationcomplete', () => exp.destroy());
      }

      loseLife() {
        this.lives--;
        if (this.hearts[this.lives]) this.hearts[this.lives].setAlpha(0.25);
        if (this.lives <= 0) {
          this.triggerGameOver();
          return;
        }
        this.invincible = true;
        this.tweens.add({
          targets: this.player, alpha: 0.25,
          duration: 80, yoyo: true, repeat: 8,
          onComplete: () => { this.player.setAlpha(1); this.invincible = false; }
        });
      }

      showSpeedUp() {
        const flash = this.add.text(W / 2, H / 2 - 20, 'SPEED UP!', {
          fontFamily: 'monospace', fontSize: '34px', fontStyle: 'bold',
          color: '#ffff00', stroke: '#cc3300', strokeThickness: 5
        }).setOrigin(0.5).setDepth(30);
        this.tweens.add({
          targets: flash, alpha: 0, y: H / 2 - 70,
          duration: 1400, ease: 'Power2',
          onComplete: () => flash.destroy()
        });
      }

      // ── Jump ────────────────────────────────────────────────────────────────
      doJump() {
        if (this.player.body.blocked.down) {
          this.player.body.setVelocityY(-640);
        }
      }

      triggerGameOver() {
        if (this.gameOverTriggered) return;
        this.gameOverTriggered = true;
        this.physics.pause();
        this.registry.set('finalScore', this.score);
        this.time.delayedCall(600, () => { this.scene.start('GameOver'); });
      }

      update(time, delta) {
        if (this.gameOverTriggered) return;

        // ── Difficulty: speed tier increases every 15 s ───────────────────
        if (!this.gameStartTime) this.gameStartTime = time;
        const newLevel = Math.floor((time - this.gameStartTime) / 15000);
        if (newLevel > this.speedLevel) {
          this.speedLevel  = newLevel;
          this.scrollSpeed = 2.2 + newLevel * 0.28;
          this.showSpeedUp();
        }

        const t  = delta / 16.667;
        const sd = this.scrollSpeed * t;

        // Parallax scroll (background layers scale with speed)
        this.bg.sky.tilePositionX       += 0.06 * t;
        this.bg.mountains.tilePositionX += 0.22 * t * (this.scrollSpeed / 2.2);
        this.bg.rocksMid.tilePositionX  += 0.55 * t * (this.scrollSpeed / 2.2);
        this.bg.rocksNear.tilePositionX += 1.10 * t * (this.scrollSpeed / 2.2);

        // Lock player X — or push left if a platform wall is blocking the player.
        const pRight  = this.player.x + this.CHAR.bodyRight;
        const pBottom = this.player.y + this.CHAR.bodyBottom;
        let wallBlocked = false;
        for (const p of this.platforms) {
          if (p.surf.x        <  pRight          &&   // platform left inside player right
              p.surf.x + p.width > this.player.x - 20 &&   // player not fully past platform
              pBottom > p.surf.y + 5) {              // player feet below platform top (side hit, not landing)
            wallBlocked = true;
            break;
          }
        }
        if (wallBlocked) {
          this.player.body.setVelocityX(0);
          this.player.x -= sd;
          if (this.player.x < -64) {
            this.triggerGameOver();
          }
        } else {
          this.player.x = Math.round(W * 0.2);
          this.player.body.setVelocityX(0);
        }

        // Switch between run and jump animation (rover is a single static frame — no animation)
        if (this.devCharKey !== 'rover') {
          const wantAnim = this.player.body.blocked.down
            ? this.devCharKey + '-run'
            : this.devCharKey + '-jump';
          if (this.player.anims.currentAnim?.key !== wantAnim) {
            this.player.play(wantAnim);
          }
        }

        // Input
        if (Phaser.Input.Keyboard.JustDown(this.jumpKeys.space) ||
            Phaser.Input.Keyboard.JustDown(this.jumpKeys.up)) {
          this.doJump();
        }
        if (Phaser.Input.Keyboard.JustDown(this.shootKeys.f) ||
            Phaser.Input.Keyboard.JustDown(this.shootKeys.z)) {
          this.doShoot();
        }

        // ── Enemies: spawn, UFO fire, cull ───────────────────────────────
        const spawnInterval = Math.max(500, 1600 - this.score * 2 - this.speedLevel * 100);
        if (time - this.lastEnemySpawnTime > spawnInterval) {
          this.lastEnemySpawnTime = time;
          this.spawnEnemy(time);
        }

        // Occasional UFO flyby — only one on screen at a time
        if (this.ufos.length === 0 && time > this.nextUFOSpawnTime) {
          this.nextUFOSpawnTime = time + Phaser.Math.Between(12000, 20000);
          this.spawnUFO(time);
        }

        // Scroll UFO visuals — swoop + occasional beam flash
        for (let i = this.ufos.length - 1; i >= 0; i--) {
          const u = this.ufos[i];
          u.elapsed += delta;
          u.x += u.vx * (delta / 1000);
          u.y = u.baseY + Math.sin((u.elapsed / 1000) * u.swoopFreq * Math.PI * 2) * u.swoopAmp;

          if (u.beamOn) {
            if (time > u.beamEndTime) {
              u.beamOn = false;
              u.setFrame(0);
              u.nextBeamTime = time + Phaser.Math.Between(2500, 6000);
            }
          } else if (time > u.nextBeamTime) {
            u.beamOn = true;
            u.setFrame(1);
            u.beamEndTime = time + Phaser.Math.Between(250, 600);
          }

          if (u.x < -100) { u.destroy(); this.ufos.splice(i, 1); }
        }

        // Cull enemies and bullets that have left the screen
        [...this.crabGroup.getChildren(), ...this.meteorGroup.getChildren()].forEach(e => {
          if (e.x < -120 || e.y > H + 80) e.destroy();
        });
        this.bulletGroup.getChildren().slice().forEach(b => {
          if (b.x > W + 60) b.destroy();
        });

        // ── Player fell through a gap ─────────────────────────────────────
        if (!this.invincible && this.player.y > H + 20) {
          this.loseLife();
          if (!this.gameOverTriggered) {
            this.player.body.reset(Math.round(W * 0.2), (H - 40) - 64);
          }
        }

        // ── Ground segments: sync velocity, scroll visuals, cull, spawn ──
        this.lastGroundRightX -= sd;
        for (let i = this.groundSegments.length - 1; i >= 0; i--) {
          const s = this.groundSegments[i];
          s.rect.body.setVelocityX(-this.scrollSpeed * 60);
          s.vis.x = s.rect.x;
          if (s.rect.x + s.width < -80) {
            s.vis.destroy();
            s.playerCol.destroy();
            s.crabCol.destroy();
            s.rect.destroy();
            this.groundSegments.splice(i, 1);
          }
        }
        while (this.lastGroundRightX < W + 500) this.spawnGroundChunk();

        // ── Platforms: sync surf velocity to current speed, scroll visuals ─
        this.lastPlatRightX -= sd;
        for (let i = this.platforms.length - 1; i >= 0; i--) {
          const p = this.platforms[i];
          p.surf.body.setVelocityX(-this.scrollSpeed * 60); // keep in sync with scroll
          p.tiles.forEach(t => { t.x -= sd; });
          if (p.surf.x + p.width < -100) {
            p.tiles.forEach(t => t.destroy());
            p.collider.destroy();
            p.crabCollider.destroy();
            p.surf.destroy();
            this.platforms.splice(i, 1);
          }
        }
        while (this.lastPlatRightX < W + 400) this.spawnPlatform();

        // ── Clouds: scroll and collect ────────────────────────────────────
        const pb = this.player.getBounds();
        for (let i = this.clouds.length - 1; i >= 0; i--) {
          const c = this.clouds[i];
          c.x -= sd;
          if (c.x < -100) { c.destroy(); this.clouds.splice(i, 1); continue; }
          if (Phaser.Geom.Rectangle.Overlaps(pb, c.getBounds())) this.collectCloud(c, i);
        }
      }
    }

    // ── BOOT ───────────────────────────────────────────────────────────────────
    const config = {
      type: Phaser.AUTO,
      width: W,
      height: H,
      parent: 'game-container',
      backgroundColor: '#020008',
      pixelArt: true,
      antialias: false,
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: W,
        height: H,
      },
      physics: {
        default: 'arcade',
        arcade: { gravity: { y: 1500 }, debug: false }
      },
      dom: { createContainer: true },
      scene: [EmailGateScene, CharacterSelectScene, GameScene, GameOverScene]
    };

    window.game = new Phaser.Game(config);
  </script>
</body>
</html>
